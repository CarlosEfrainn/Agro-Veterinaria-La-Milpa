<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | Agro Veterinaria La Milpa</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            verde: {
              oscuro: '#1a4a2e',
              medio:  '#2d7a4f',
              claro:  '#4caf7d',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="min-h-screen bg-verde-oscuro flex items-center justify-center px-4 font-sans">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-10">
    <div class="text-center mb-8">

    <!-- Logo del negocio -->
    <div class="inline-flex items-center justify-center w-24 h-24 rounded-2xl mb-4">
        <img src="../../Imagenes/Logo.jpeg" alt="Logo Agro Veterinaria La Milpa" class="w-full h-full object-contain rounded-2xl"/>
    </div>

    <!--Titulo -->
    <h1 class="text-2xl font-bold text-verde-oscuro">
        Panel de Administracion
    </h1>

    <!--Subtitulo -->
    <p class="text-gray-400 text-sm mt-1">
        Agro Veterinaria La Milpa Santa Elena
    </p>

    </div>

    <div class="space-y-5">

    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">Usuario</label>

      <input type="text" placeholder="Ingresa tu usuario" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm
      text-gray-800 placeholder-gray-300
      focus:outline-none focus:ring-2 focus:ring-verde-claro focus:border-transparent
      transition duration-200"
      />
    </div>

    <div class="flex flex-col gap-1">

      <label class="text-sm font-medium text-gray-700">Contraseña</label>

      <input type="password" placeholder="Ingresa tu contraseña"class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm
      text-gray-800 placeholder-gray-300
      focus:outline-none focus:ring-2 focus:ring-verde-claro focus:border-transparent
      transition duration-200"
      />
    </div>

    <button class="w-full bg-verde-oscuro hover:bg-verde-medio text-white font-semibold py-3 rounded-xl transition duration-200 mt-2">Ingresar al Panel</button>
    </div>
    <p class="text-center text-gray-400 text-xs mt-6">
    🔒 Acceso restringido solo para administradores
    </p>
</div>
</body>
</html>
